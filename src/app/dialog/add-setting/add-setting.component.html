<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
  integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
<h2 mat-dialog-title>
  <span *ngIf="this.entity_id==undefined">Create</span>
  <span *ngIf="this.entity_id!=undefined">Edit</span>
  App Setting
</h2>
<div mat-dialog-content>
  <div [formGroup]="newSetting">
    <mat-card-content class="flex-row">
      <mat-form-field appearance="outline" class="w-100">
        <input matInput formControlName="title" placeholder="Enter Title">
      </mat-form-field>
      <div class="text-danger"
        *ngIf="(newSetting.get('title')?.hasError('required') && (submitted || (newSetting.get('title')?.dirty)))">
        *Title Field Is Required
      </div>
    </mat-card-content>
    <mat-card-content class="flex-row">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Description</mat-label>
        <input matInput formControlName="description" placeholder="Enter description">
      </mat-form-field>
      <div class="text-danger"
        *ngIf="(newSetting.get('description')?.hasError('required') && (submitted || (newSetting.get('description')?.dirty)))">
        *Description Field Is Required
      </div>
    </mat-card-content>
    <mat-card-content class="flex-row">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Url</mat-label>
        <input matInput formControlName="url" placeholder="Enter url">
      </mat-form-field>
      <div class="text-danger"
        *ngIf="(newSetting.get('url')?.hasError('required') && (submitted || (newSetting.get('url')?.dirty)))">
        *Url Field Is Required
      </div>
    </mat-card-content>
    <!-- <mat-card-content class="flex-row"> -->
      <div class="row">
        <div class="col">
          <label class="position-relative d-flex align-items-center gap-2">Upload <mat-icon class="material-symbols-sharp"
              matTooltip="Please select only jpeg,png format image.">info</mat-icon></label>
          <div class="custom-file">
            <input class="ng-hide" formControlName="image" (change)="onFileSelected($event)" id="input-file-id"
            type="file" />
              <label for="input-file-id">Upload Image</label>
          </div>
     
            <div class="text-danger"
              *ngIf="(newSetting.get('image')?.hasError('required') && (submitted || (newSetting.get('image')?.dirty)))">
              *Image Field Is Required
            </div>
          </div>
          <div class="col">
              <ng-container *ngIf="image">
                  <div class="image-preview">
                      <img id="preview" [src]=image>
                  </div>
              </ng-container>
          </div>
      </div>

    <!-- </mat-card-content> -->
  </div>
</div>
<div mat-dialog-actions fxLayoutAlign="end center" style="padding: 20px;">
  <button [disabled]="_appService.isButtonDisabled()" class="primary" (click)="saveSetting()" mat-raised-button
    color="primary">Save</button>
  <button [disabled]="_appService.isButtonDisabled()" (click)="closeDialogBox()" mat-raised-button color="accent"
    class="accent">Close</button>
</div>
