<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
    integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
<h2 mat-dialog-title>
    Update Suggested Price
</h2>
<div mat-dialog-content>
    <form [formGroup]="bookingCancelForm" fxFlex="100">
        <mat-card-content class="flex-row" fxFlex="100">
            <div fxLayout="column">
                <mat-form-field class="example-full-width w-100" appearance="outline">
                    <mat-label>Select Price</mat-label>
                    <mat-select formControlName="price_uid">
                        <mat-option *ngFor="let type of priceData" value={{type.id}}>
                            {{type.title}}</mat-option>
                    </mat-select>
                </mat-form-field>
                <div class="text-danger"
                    *ngIf="(bookingCancelForm.get('status')?.hasError('required') && (submitted || (bookingCancelForm.get('status')?.dirty)))">
                    *Select Price is required
                </div>
            </div>
        </mat-card-content>

    </form>
</div>
<div mat-dialog-actions fxLayoutAlign="end center" style="padding: 10px 20px 20px;">
    <button [disabled]="_appService.isButtonDisabled()" mat-raised-button color="primary" class="primary"
        (click)="submit()">Update</button>
    <button [disabled]="_appService.isButtonDisabled()" mat-raised-button color="accent" class="accent"
        (click)="closeDialogBox()">Close</button>
</div>
