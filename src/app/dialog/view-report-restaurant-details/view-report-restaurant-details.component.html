<h2 mat-dialog-title>View Restaurant Details</h2>
<mat-dialog-content class="mat-typography">

    <div class="d-flex justify-content-between gap-3">
        <table class="table table-bordered">
            <tr>
                <th>Name</th>
                <td>{{restroData.name?restroData.name:'N/A'}}</td>
            </tr>
            <tr>
                <th>Phone</th>
                <td>{{restroData.phone?restroData.phone:'N/A'}}</td>
            </tr>
            <tr>
                <th>Address</th>
                <td>{{restroData.address?restroData.address:'N/A'}}</td>
            </tr>
        </table>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-raised-button mat-dialog-close color="accent">Cancel</button>
</mat-dialog-actions>
