<h2 mat-dialog-title>Add Test User</h2>
<mat-dialog-content class="mat-typography">
  
        <div class="row">
            <div class="col-12">
                <mat-form-field appearance="outline" class="textarea w-100">

                    <textarea matInput cdkAutosizeMinRows="1"
                    cdkAutosizeMaxRows="8" placeholder="Email" [(ngModel)]="email"></textarea>


                </mat-form-field>
            </div>
        </div>
</mat-dialog-content>
<mat-dialog-actions align="end" class="p-3 pt-1">
    <button mat-raised-button color="accent" (click)="close()">Close</button>

    <button mat-raised-button color="primary" [disabled]="!email" (click)="saveForm()">Save</button>
</mat-dialog-actions>
