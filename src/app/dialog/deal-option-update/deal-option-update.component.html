<div class="Decline">
    <h2 mat-dialog-title>Update Deal Options</h2>
    <div mat-dialog-content class="pb-0">
        <div fxLayout="column">
            <div [formGroup]="dealOption">
                <mat-card-content class="flex-row" fxLayoutGap="20">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Device Check</mat-label>
                        <mat-select formControlName="device_check">
                            <mat-option value="1">Yes</mat-option>
                            <mat-option value="0">No</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Is Locked</mat-label>
                        <mat-select formControlName="is_locked">
                            <mat-option value="1">Yes</mat-option>
                            <mat-option value="0">No</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Sold Out</mat-label>
                        <mat-select formControlName="sold_out">
                            <mat-option *ngIf="this.selectedDeal.id" value="1">Yes</mat-option>
                            <mat-option value="0">No</mat-option>
                        </mat-select>
                    </mat-form-field>
                </mat-card-content>
                <mat-form-field class="example-full-width w-100" appearance="outline">
                    <mat-label>Booking Count</mat-label>
                    <input matInput type="number" formControlName="count">
                </mat-form-field>
                <mat-card-content *ngIf="dealOption.value.is_locked==1" class="flex-row" fxLayoutGap="20">
                    <mat-form-field class="example-full-width w-100" appearance="outline">
                        <mat-label>Referral</mat-label>
                        <input matInput type="number" formControlName="referral">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Referral Mobile Verified</mat-label>
                        <mat-select formControlName="referral_mobile_verified">
                            <mat-option value="1">Yes</mat-option>
                            <mat-option value="0">No</mat-option>
                        </mat-select>
                    </mat-form-field>
                </mat-card-content>
                <mat-card-content *ngIf="dealOption.value.is_locked==1" class="flex-row" fxLayoutGap="20">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>For Same Restaurant</mat-label>
                        <mat-select formControlName="type">
                            <mat-option value="1">Yes</mat-option>
                            <mat-option value="0">No</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field *ngIf="dealOption.value.type==0" class="example-full-width w-100" appearance="outline">
                        <mat-label>Select Restaurant </mat-label>
                        <mat-select formControlName="restaurant_id">
                            <mat-option *ngFor="let type of restaurantData | sort:'name'" value={{type.id}}>
                                {{type.name}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Restaurant Template</mat-label>
                        <mat-select formControlName="template">
                            <mat-option value="0">Booking Fee</mat-option>
                            <mat-option value="1">Advance Payment</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Booking Fee Required</mat-label>
                        <mat-select formControlName="booking_fee_required">
                            <mat-option value="1">Yes</mat-option>
                            <mat-option value="0">No</mat-option>
                        </mat-select>
                    </mat-form-field>
                </mat-card-content>
            </div>
        </div>
    </div>
    <div mat-dialog-actions fxLayoutAlign="end center" style="padding: 20px;">
        <button [disabled]="_appService.isButtonDisabled()" (click)="updateDeal()" class="primary" color="primary"
            mat-raised-button>Update</button>
        <button [disabled]="_appService.isButtonDisabled()" (click)="closeDialogBox()" class="secondary" color="accent"
            mat-raised-button>Cancel</button>
    </div>
</div>
