<h2 mat-dialog-title>View Details</h2>
<div mat-dialog-content>
    <div class="table-responsive">
        <table [dataSource]="dataSource" mat-table class="w-100">
            <div>
                <ng-container matColumnDef="txnId">
                    <th mat-header-cell *matHeaderCellDef>Transaction Id</th>
                    <td mat-cell *matCellDef="let element">{{element?.ref_txn_id?element?.ref_txn_id:'N/A'}} </td>
                </ng-container>
                <ng-container matColumnDef="message">
                    <th mat-header-cell *matHeaderCellDef>Message</th>
                    <td mat-cell *matCellDef="let element">
                        {{element?.txn_details?.message?element?.txn_details?.message:'N/A'}} </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </div>
        </table>
    </div>
</div>

<div mat-dialog-actions fxLayoutAlign="end center" style="padding: 10px 20px 20px;">
    <button [disabled]="_appService.isButtonDisabled()" mat-raised-button color="accent"
        (click)="closeDialogBox()">Close</button>
</div>
