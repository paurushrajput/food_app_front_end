<!-- <h2 mat-dialog-title>View  Details</h2> -->
<div mat-dialog-content>
  <div class="table-responsive">
    <table [dataSource]="dataSource" mat-table class="w-100">
      <!-- Name Column -->
      <ng-container matColumnDef="guest">
        <th mat-header-cell *matHeaderCellDef style="width: 50px;">Guest Count </th>
        <td mat-cell *matCellDef="let element" style="width: 50px;">{{element.num_person}} </td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Commission</th>
        <td mat-cell *matCellDef="let element" style="width: 50px;">{{"AED " +element.amount}} </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
<div mat-dialog-actions fxLayoutAlign="end center" style="padding: 20px;">
  <button [disabled]="_appService.isButtonDisabled()" mat-raised-button color="accent"
    (click)="closeDialogBox()">Close</button>
</div>
