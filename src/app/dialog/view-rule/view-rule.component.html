<h2 mat-dialog-title>View Rule Details</h2>
    <div mat-dialog-content>
        <div class="table-responsive">
            <table [dataSource]="dataSource" mat-table class="w-100">
              <!-- Name Column -->
              <div>
                <ng-container matColumnDef="rule">
                  <th mat-header-cell *matHeaderCellDef>Rules :-</th>
                  <td mat-cell *matCellDef="let element">{{element}} </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </div>
            </table>
         </div>
    </div>
    <div mat-dialog-actions fxLayoutAlign="end center" style="padding: 10px 20px 20px;">
      <button [disabled]="_appService.isButtonDisabled()" mat-raised-button color="accent" (click)="closeDialogBox()">Close</button>
    </div>
