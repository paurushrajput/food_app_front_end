<h2 mat-dialog-title>View Restaurant Details</h2>
<div mat-dialog-content>
    <div class="table-responsive">
        <table [dataSource]="dataSource" mat-table class="w-100">
            <!-- Name Column -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>Email</th>
                <td mat-cell *matCellDef="let element"> {{element.email?element.email:'N/A'}} </td>
            </ng-container>
            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef>Mobile</th>
                <td mat-cell *matCellDef="let element"> {{element.phone?element.phone:'N/A'}} </td>
            </ng-container>
            <ng-container matColumnDef="seat">
                <th mat-header-cell *matHeaderCellDef style="width: 90px;">Seats Allocated</th>
                <td mat-cell *matCellDef="let element"> {{element.booking?.total_seats_allocated}} </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
<div mat-dialog-actions fxLayoutAlign="end center" style="padding: 20px;">
    <button [disabled]="_appService.isButtonDisabled()" mat-raised-button color="accent"
        (click)="closeDialogBox()">Close</button>
</div>
