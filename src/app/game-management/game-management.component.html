        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="sticky-table" fxFlex="100">
            <ng-container matColumnDef="sr">
              <th mat-header-cell *matHeaderCellDef> Sr No. </th>
              <td mat-cell *matCellDef="let element;index as i;"> {{ currentPage * pageSize + i + 1 }} </td>
            </ng-container>
            <ng-container matColumnDef="title">
              <th mat-header-cell *matHeaderCellDef> Title</th>
              <td mat-cell *matCellDef="let element"> {{element.title?element.title:'N/A'}} </td>
            </ng-container>
            <ng-container matColumnDef="excerpt">
              <th mat-header-cell *matHeaderCellDef>Excerpt</th>
              <td mat-cell  *matCellDef="let element"> {{element.excerpt}} </td>
            </ng-container>
            <ng-container matColumnDef="game_url">
              <th mat-header-cell *matHeaderCellDef>Game Url</th>
              <td mat-cell *matCellDef="let element"> <a href="{{element.game_url}}" target="_blank"></a>{{element.game_url?element.game_url:'N/A'}} </td>
            </ng-container>
          
            <ng-container matColumnDef="image">
              <th mat-header-cell *matHeaderCellDef>Image</th>
              <td mat-cell *matCellDef="let element">  <img (click)="previewImage(element.image)" src="{{element.image}}" style="max-width: 100px;"></td>
            </ng-container>
