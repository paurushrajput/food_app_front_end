<!-- <app-sidenav></app-sidenav> -->
<div class="WrapperArea">
  <mat-toolbar class="pagetitle-bar w-100 mb-0" fxLayoutAlign="space-between center" fxLayoutGap="20">
    <h2 class="admin-logo">Breakup Management</h2>
    <button mat-raised-button color="primary" class="primary" (click)="openDialog()">Add Breakup</button>
  </mat-toolbar>
  <mat-sidenav-container class="example-sidenav-container" autosize>
    <div class="WrapperBox">
      <div class="Small-Wrapper">
        <div class="searchArea mb-3" fxLayoutAlign="space-between center" fxLayoutGap="20">
          <form [formGroup]="searchForm" class="search-form" fxLayoutAlign="start center">
            <app-input-box [formgroup]="searchForm" [params]="controls.name"></app-input-box>
            <button mat-raised-button color="primary" class="primary" (click)="searchData()">Search</button>
            <button mat-raised-button color="accent" (click)="formReset()">Reset</button>
          </form>
          <mat-paginator #paginator [length]="totalRows" [pageIndex]="currentPage" [pageSize]="pageSize"
          [pageSizeOptions]="pageSizeOptions" (page)="pageChanged($event)" aria-label="Select page">
        </mat-paginator>
        </div>
        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="w-100 sticky-table">
            <ng-container matColumnDef="sr">
              <th mat-header-cell *matHeaderCellDef> Sr No. </th>
              <td mat-cell *matCellDef="let element;index as i;"> {{ currentPage * pageSize + i + 1 }} </td>
            </ng-container>
            <!-- Symbol Column -->
            <!-- <ng-container matColumnDef="type">
              <th mat-header-cell *matHeaderCellDef> Type </th>
              <td mat-cell *matCellDef="let element"> {{element.type=='0'?'Tournament':"Contest"}} </td>
            </ng-container> -->

            <!-- Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Name </th>
              <td mat-cell *matCellDef="let element"> {{ element.name ? (element.name | titlecase) : 'N/A' }}
              </td>
            </ng-container>

            <!-- Weight Column -->
            <!-- <ng-container matColumnDef="shortKey">
              <th mat-header-cell *matHeaderCellDef> Short Key </th>
              <td mat-cell *matCellDef="let element"> {{element.shortKey?element.shortKey:"N/A"}} </td>
            </ng-container>
        
            <ng-container matColumnDef="tourKey">
              <th mat-header-cell *matHeaderCellDef> Tour Key </th>
              <td mat-cell *matCellDef="let element"> {{element.tourKey?element.tourKey:"N/A"}} </td>
            </ng-container> -->

            <!-- <ng-container matColumnDef="startDate">
              <th mat-header-cell *matHeaderCellDef> Start Date </th>
              <td mat-cell *matCellDef="let element"> {{element.createdAt | date: 'dd/MM/yyyy'}} </td>
            </ng-container> -->

            <!-- <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef> Status </th>
              <td mat-cell *matCellDef="let element" >
                <span [ngClass] ="element.status == '1'?'badge success':'badge danger'"> {{element.status =='1'?'Active':'Inactive'}}</span> 
              </td>
            </ng-container> -->

            <ng-container matColumnDef="view">
              <th mat-header-cell *matHeaderCellDef> Details </th>
              <td mat-cell *matCellDef="let element">
                <button mat-mini-fab (click)="viewBreakupDialog(element)" color="info" class="info-btn">
                  <mat-icon class="material-symbols-sharp">info</mat-icon>
                  
                </button>
            </ng-container>

            <!-- <ng-container matColumnDef="edit">
              <th mat-header-cell *matHeaderCellDef> Edit </th>
              <td mat-cell *matCellDef="let element">
                <button [disabled]="_appService.isButtonDisabled()" (click)="showEditForm(element)" mat-raised-button color="white">
                  <mat-icon>edit</mat-icon>
                </button>
            </ng-container>
        
            <ng-container matColumnDef="delete">
              <th mat-header-cell *matHeaderCellDef> Delete </th>
              <td mat-cell *matCellDef="let element">
              <button [disabled]="_appService.isButtonDisabled()" (click)="openBox(element)" mat-raised-button color="warn">
                <mat-icon> delete_sweep</mat-icon>
              </button>
        
              </td>
            </ng-container> -->


            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
        <div>
          <!-- <mat-paginator #paginator [length]="userlistcount" [pageIndex]="currentPage" [pageSize]="pageSize"
            [pageSizeOptions]="pageSizeOptions"  (page)="pageChanged($event)"  aria-label="Select page">
          </mat-paginator> -->
        </div>
      </div>
      <div>
      </div>
    </div>
  </mat-sidenav-container>
</div>
