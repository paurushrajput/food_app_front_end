<div class="WrapperArea">
  <mat-toolbar class="pagetitle-bar">
    <h2>Role Permission Management</h2>
  </mat-toolbar>
  <mat-sidenav-container class="example-sidenav-container" autosize>
    <div class="WrapperBox">
      <div class="Small-Wrapper">
        <form [formGroup]="permisionForm" >
          <mat-form-field class="example-full-width w-25" appearance="outline">
            <mat-label>Select Role</mat-label>
            <mat-select formControlName="role_id" >
                <mat-option *ngFor="let type of roleData" value={{type.id}}>
                    {{type.name}}</mat-option>
            </mat-select>
          </mat-form-field>
          <div class="w-75">
          <div class="table-responsive">
            <table mat-table [dataSource]="groupedModules" class="sticky-table" fxFlex="100">
              
              <!-- Module Name Column -->
              <ng-container matColumnDef="module_name">
                <th mat-header-cell *matHeaderCellDef> Module Name </th>
                <td mat-cell *matCellDef="let module"> {{ module.module_name |customTitlecase }} </td>
              </ng-container>
              
              <!-- Permissions Column -->
              <ng-container matColumnDef="permissions">
                <th mat-header-cell *matHeaderCellDef> Permissions </th>
                <td mat-cell *matCellDef="let module" style="display: flex;">
                  <div class="form-row flex-nowrap w-100">
                    <div class="col" *ngFor="let permission of module.permissions">
                        <mat-checkbox
                          (change)="onPermissionChange($event, permission.id)"
                          [checked]="isPermissionSelected(permission.id)">
                          {{ permission.type }}
                        </mat-checkbox>
                    </div>
                  </div>
                </td>
              </ng-container>
             
              
              <tr mat-header-row *matHeaderRowDef="['module_name', 'permissions']"></tr>
              <tr mat-row *matRowDef="let row; columns: ['module_name', 'permissions'];"></tr>
            </table>
          </div>
          <div class="mt-3 text-right">
            <button mat-raised-button color="primary" (click)="saveModule()">Save</button>
          </div>
        </div>
        </form>
      </div>
    </div>
  </mat-sidenav-container>
</div>
